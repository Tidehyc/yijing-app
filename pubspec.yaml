name: yijing_app
description: "易经六爻起卦 - 古风占卜应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  sensors_plus: ^6.1.1
  audioplayers: ^6.1.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2
  http: ^1.3.0
  flutter_animate: ^4.5.2
  lunar: ^1.6.5
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/audio/

  fonts:
    - family: KaiTi
      fonts:
        - asset: assets/fonts/KaiTi.ttf
    - family: FangSong
      fonts:
        - asset: assets/fonts/FangSong.ttf
